<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SBA Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA -->
    <link rel="icon" href="Assets/icons/heart.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#fff3ff" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/filters.css" />
    <link rel="stylesheet" href="css/cards.css" />
    <link rel="stylesheet" href="css/onlineBanner.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="header-top">
          <h1 class="header-title">Species Database</h1>
          <div class="header-buttons">
            <button class="sync-btn" id="syncBtn" title="Sync Data">🔄</button>
            <button class="lang-btn">EN</button>
          </div>
        </div>
      </header>

      <!-- Sync/Offline Banner -->
      <div class="sync-banner hidden" id="sync-banner" role="status">
        <span class="sync-banner-icon" id="sync-banner-icon">🔄</span>
        <span class="sync-banner-text" id="sync-banner-text"
          >Syncing data...</span
        >
      </div>

      <!-- Filter Carousel -->
      <div class="filter-carousel-container">
        <div class="filter-carousel" id="filter-carousel">
          <button class="filter-button" data-filter="all">Reset</button>
          <button class="filter-button" data-filter="a-z">A-Z</button>
          <button class="filter-button" data-filter="leaf-type">
            Leaf Type
          </button>
          <button class="filter-button" data-filter="fruit-type">
            Fruit Type
          </button>
        </div>
      </div>

      <div class="view-toolbar" aria-label="Species view toggle">
        <button
          class="view-btn active"
          id="listViewBtn"
          type="button"
          aria-label="List view"
          title="List view"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6.5h16v2H4v-2Zm0 5.25h16v2H4v-2Zm0 5.25h16v2H4v-2Z" />
          </svg>
        </button>
        <button
          class="view-btn"
          id="gridViewBtn"
          type="button"
          aria-label="Grid view"
          title="Grid view"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M4 4h7v7H4V4Zm9 0h7v7h-7V4ZM4 13h7v7H4v-7Zm9 0h7v7h-7v-7Z"
            />
          </svg>
        </button>
      </div>

      <div class="container" id="species-list"></div>

      <a class="back-link" href="index.html"></a>

      <div class="debug" id="debugInfo"></div>
    </main>
    <div class="bottom-search-dock" aria-label="Search species">
      <div class="search-bar search-bar--sticky">
        <span class="search-icon">
          <img src="Assets/icons/search.svg" alt="Search" />
        </span>

        <input type="text" placeholder="Search species" id="searchInput" />
      </div>
    </div>
    <!-- Sync Status Toast -->
    <div class="sync-status" id="syncStatus"></div>
    <style>
      .header-buttons {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .view-btn {
        width: 40px;
        height: 40px;
        border: none;
        background: #ffffff;
        border-radius: 8px;
        display: grid;
        place-items: center;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          background 0.2s ease;
        color: #0b5c37;
        box-shadow: 0 1px 5px rgba(15, 23, 42, 0.08);
      }

      .view-btn.active {
        background: #0b5c37;
        color: #ffffff;
        transform: translateY(-1px);
      }

      .view-toolbar {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px;
        margin: 0 1.5rem 0.5rem;
        border-radius: 14px;
        background: #edf9f0;
        border: 1px solid #cfe9d6;
        width: fit-content;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
      }

      .view-btn svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      .sync-btn {
        background: #ffffff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .sync-btn:hover {
        background: #f0f0f0;
      }

      .sync-btn.syncing {
        animation: spin 1s linear infinite;
        pointer-events: none;
        opacity: 0.7;
      }

      .sync-btn.success {
        background: #d4edda;
        border-color: #28a745;
      }

      .sync-btn.error {
        background: #f8d7da;
        border-color: #dc3545;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .sync-status {
        position: fixed;
        bottom: 88px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: #fff;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 14px;
        z-index: 1000;
        display: none;
      }

      .sync-status.show {
        display: block;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      /* Styles for syncing banner. Different colours per state (e.g. green for success etc.)*/
      .sync-banner {
        display: flex;
        align-items: center;
        gap: 20px;
        margin: 16px 16px 0;
        padding: 16px 16px;
        border-radius: 16px;
        font-size: 20px;
        border: 1px solid transparent;
      }
      /* Remove the banner when it is not needed (doesn't need to have a constant online banner) */
      .sync-banner.hidden {
        display: none;
      }

      .sync-banner.syncing {
        background: #eef6ff;
        color: #0b57d0;
        border-color: #cfe2ff;
      }

      .sync-banner.online {
        background: #edf9f0;
        color: #1f7a38;
        border-color: #cfe9d6;
      }

      .sync-banner.offline {
        background: #fff4e5;
        color: #9a5b00;
        border-color: #ffd59e;
      }

      .sync-banner.error {
        background: #fdecec;
        color: #b42318;
        border-color: #f5c2c7;
      }

      .bottom-search-dock {
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: calc(16px + env(safe-area-inset-bottom));
        width: auto;
        max-width: 480px;
        margin: 0 auto;
        padding: 0;
        box-sizing: border-box;
        z-index: 1001;
      }

      .bottom-search-dock .search-bar--sticky {
        border-radius: 999px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.16);
        border: 1px solid rgba(11, 92, 55, 0.08);
      }
    </style>

    <!-- LANGUAGE OVERLAY -->

    <div class="lang-overlay" id="langOverlay">
      <div
        class="lang-modal"
        role="dialog"
        aria-modal="true"
        aria-label="Choose language"
      >
        <button class="close-overlay" id="closeOverlay" aria-label="Close">
          ✖
        </button>

        <div class="lang-title">You Selected</div>

        <div class="selected-pill" id="selectedPill">
          <div class="flag" id="selectedFlag" aria-hidden="true">🇦🇺</div>
          <div class="selected-name" id="selectedName">ENGLISH AU</div>
          <div class="check-dot" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path
                d="M9.2 16.6 4.9 12.3l1.4-1.4 2.9 2.9 8-8 1.4 1.4-9.4 9.4z"
              />
            </svg>
          </div>
        </div>

        <div class="lang-title" style="margin-top: 18px">All Languages</div>

        <section class="card" aria-label="Language list">
          <div class="list" id="langList" role="listbox" aria-label="Languages">
            <div
              class="row selected"
              role="option"
              aria-selected="true"
              data-code="EN"
              data-name="ENGLISH AU"
              data-flag="🇦🇺"
            >
              <div class="flag" aria-hidden="true">🇦🇺</div>
              <div class="name">ENGLISH AU</div>
              <div class="radio" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M9.2 16.6 4.9 12.3l1.4-1.4 2.9 2.9 8-8 1.4 1.4-9.4 9.4z"
                  />
                </svg>
              </div>
            </div>

            <div
              class="row"
              role="option"
              aria-selected="false"
              data-code="TET"
              data-name="Tetum"
              data-flag="🇹🇱"
            >
              <div class="flag" aria-hidden="true">🇹🇱</div>
              <div class="name">TETUM</div>
              <div class="radio" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M9.2 16.6 4.9 12.3l1.4-1.4 2.9 2.9 8-8 1.4 1.4-9.4 9.4z"
                  />
                </svg>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <!-- FILTER OVERLAY (NEW) -->
    <div class="filter-overlay" id="filterOverlay">
      <div class="filter-modal">
        <button class="close-filter-overlay" id="closeFilterOverlay">✖</button>
        <h2 id="filterTitle"></h2>
        <p id="filterDescription"></p>
        <div id="filterOptions"></div>
      </div>
    </div>

    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script> -->
    <script src="scripts/config.js"></script>
    <script src="scripts/db.js"></script>
    <script src="scripts/dataService.js"></script>
    <script src="scripts/sync.js"></script>

    <script src="scripts/imageCache.js"></script>
    <script src="scripts/videoCache.js"></script>
    <script src="scripts/specieslist.js"></script>
    <script src="scripts/filterCarousel.js"></script>
    <script src="scripts/detectOnline.js" defer></script>
    <script src="scripts/sw-register.js"></script>

    <script>
      // ====================================
      // SYNC BUTTON HANDLER
      // ====================================
      const syncBtn = document.getElementById("syncBtn");
      const syncStatus = document.getElementById("syncStatus");

      // Show status toast
      function showSyncStatus(message, duration = 3000) {
        syncStatus.textContent = message;
        syncStatus.classList.add("show");
        setTimeout(() => {
          syncStatus.classList.remove("show");
        }, duration);
      }

      // Sync button click handler
      syncBtn.addEventListener("click", async () => {
        if (!navigator.onLine) {
          showSyncStatus("offline.. using cached data");
          showSyncBanner("offline", "Offline mode");
          return;
        }
        // Prevent double-click
        if (syncBtn.classList.contains("syncing")) return;

        // Start syncing state
        syncBtn.classList.add("syncing");
        syncBtn.classList.remove("success", "error");
        syncBtn.title = "Syncing...";
        showSyncStatus("🔄 Syncing data...", 10000);
        showSyncBanner("syncing", "Syncing data...");

        try {
          // Perform sync
          const result = await syncManager.manualSync(true);

          if (result.synced) {
            // Success
            syncBtn.classList.add("success");
            showSyncStatus("✅ Sync complete! Data updated.");
            showSyncBanner("online", "Data updated!", true, 5000);

            // Reload species data
            const language = (
              document.querySelector(".lang-btn")?.textContent || "EN"
            )
              .trim()
              .toLowerCase();
            const lang = language === "tet" ? "tet" : "en";
            const species = await dataService.getAllSpecies(lang);

            if (typeof window.setSpeciesData === "function") {
              window.setSpeciesData(species);
              if (typeof window.applyFilters === "function") {
                window.applyFilters();
              }
            }
          } else {
            // Already up to date
            syncBtn.classList.add("success");
            showSyncStatus("ℹ️ Already up to date!");
            showSyncBanner("online", "Already up to date!");
          }

          // Remove success state after 2 seconds
          setTimeout(() => {
            syncBtn.classList.remove("success");
          }, 2000);
        } catch (error) {
          console.error("Sync failed:", error);
          syncBtn.classList.add("error");
          showSyncStatus("❌ Sync failed: " + error.message, 3000);
          showSyncBanner(
            "error",
            "Sync failed! Using offline mode",
            true,
            5000,
          );
          setTimeout(() => {
            showSyncBanner("offline", "Offline mode", false);
          }, 5000); //need the persistnet offline banner after the error msg

          // Remove error state after 3 seconds
          setTimeout(() => {
            syncBtn.classList.remove("error");
          }, 3000);
        } finally {
          syncBtn.classList.remove("syncing");
          syncBtn.title = "Sync Data";
        }
      });

      // Set up sync progress callback
      if (typeof syncManager !== "undefined") {
        syncManager.setOnProgress((message) => {
          showSyncStatus("🔄 " + message, 10000);
        });
      }

      //Sync/state banner helper functions
      const syncBanner = document.getElementById("sync-banner");
      const syncBannerIcon = document.getElementById("sync-banner-icon");
      const syncBannerText = document.getElementById("sync-banner-text");

      let syncBannerTimeout = null;

      //Make sure the offline banner persists
      function clearSyncBannerTimeout() {
        if (syncBannerTimeout) {
          clearTimeout(syncBannerTimeout);
          syncBannerTimeout = null;
        }
      }

      //Hide the banner if it is no longer needed (e.g. success message)
      function hideSyncBanner() {
        clearSyncBannerTimeout();
        syncBanner.className = "sync-banner hidden";
      }

      //Shows the sync banner based on state of sync, success/failure of sync and if in 'offline mode'
      function showSyncBanner(
        type,
        message,
        autoHide = false,
        duration = 5000,
      ) {
        clearSyncBannerTimeout();

        syncBanner.className = `sync-banner ${type}`;
        syncBannerText.textContent = message;

        //Add icon based on state. Left this separate from base message in case there is an issue w/ Tetum tranlsation
        if (type === "syncing") {
          syncBannerIcon.textContent = "🔄";
        } else if (type === "offline") {
          syncBannerIcon.textContent = "⚠️";
        } else if (type === "online") {
          syncBannerIcon.textContent = "✅";
        } else if (type === "error") {
          syncBannerIcon.textContent = "❌";
        }

        if (autoHide) {
          const currentType = type;
          //error always followed by offline persistent banner (uses same element, dont hide if another banner directly follows)
          syncBannerTimeout = setTimeout(() => {
            if (syncBanner.classList.contains(currentType)) {
              hideSyncBanner();
            }
          }, duration);
        }
      }

      // ====================================
      // PAGE LOAD HANDLER
      // ====================================
      document.addEventListener("DOMContentLoaded", async () => {
        console.log("[Home] Page loaded");

        const code = (document.querySelector(".lang-btn")?.textContent || "EN")
          .trim()
          .toLowerCase();
        const language = code === "tet" ? "tet" : "en";

        //If offline, place the permanent offline banner and load cached data
        if (!navigator.onLine) {
          showSyncBanner("offline", "Offline mode");
          try {
            const species = await dataService.getAllSpecies(language);
            console.log("[Home] Offline load from IndexedDB:", species.length);
            window.setSpeciesData(species);
          } catch (err) {
            console.error("Failed loading offline species:", err);
            showSyncBanner("error", "No offline data available", true, 5000);
          }
          return;
        }

        try {
          // Always load from IndexedDB (offline-safe)
          const species = await dataService.getAllSpecies(language);
          console.log("[Home] Loaded species:", species.length);
          window.setSpeciesData(species);
          showSyncBanner("syncing", "Initial sync in progress...");
        } catch (err) {
          console.error("Failed loading cached species:", err);
        }

        //background sync
        try {
          if (typeof syncManager !== "undefined") {
            const res = await syncManager.checkAndSync({ forceBundle: false });
            if (res?.synced) {
              const updatedSpecies = await dataService.getAllSpecies(language);
              window.setSpeciesData(updatedSpecies);
              showSyncBanner("online", "Data up to date", true, 5000);
            } else {
              showSyncBanner("online", "Data already up to date", true, 5000);
            }
          }
        } catch (err) {
          showSyncBanner(
            "error",
            "Sync failed! Using offline mode",
            true,
            5000,
          );
          setTimeout(() => {
            showSyncBanner("offline", "Offline mode", false);
          }, 5000); //need the persistnet offline banner after the error msg
        }
      });

      // ====================================
      // LANGUAGE HANDLER
      // ====================================
      const langBtn = document.querySelector(".lang-btn");
      const overlay = document.getElementById("langOverlay");
      const closeBtn = document.getElementById("closeOverlay");
      const selectedNameEl = document.getElementById("selectedName");
      const selectedFlagEl = document.getElementById("selectedFlag");
      langBtn.addEventListener("click", () => {
        overlay.style.display = "flex";
      });
      closeBtn.addEventListener("click", () => {
        overlay.style.display = "none";
      });
      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) overlay.style.display = "none";
      });
      document.querySelectorAll("#langList .row").forEach((row) => {
        row.addEventListener("click", () => {
          document.querySelectorAll("#langList .row").forEach((r) => {
            r.classList.remove("selected");
            r.setAttribute("aria-selected", "false");
          });
          row.classList.add("selected");
          row.setAttribute("aria-selected", "true");
          selectedNameEl.textContent = row.dataset.name;
          selectedFlagEl.textContent = row.dataset.flag;
          langBtn.textContent = row.dataset.code;
          overlay.style.display = "none";
          if (row.dataset.code === "TET") {
            window.location.href = "tetum.html";
          } else {
            window.location.href = "home.html";
          }
        });
      });

      // ====================================
      // FILTER OVERLAY JS
      // ====================================
      const filterOverlay = document.getElementById("filterOverlay");
      const closeFilterOverlay = document.getElementById("closeFilterOverlay");
      const filterTitle = document.getElementById("filterTitle");
      const filterOptions = document.getElementById("filterOptions");
      const filterDescription = document.getElementById("filterDescription");

      // Global state for active filters
      let activeFilters = {
        leafType: null,
        fruitType: null,
      };

      // Leaf Type options
      const leafTypeOptions = [
        "Simple",
        "Pinnately compound (single)",
        "Pinnately compound (double)",
        "Pinnately compound (triple)",
        "Palmately compound",
      ];

      // Fruit Type options
      const fruitTypeOptions = ["Drupe", "Capsule", "Follicle", "Pod"];

      const filterConfigs = {
        "a-z": {
          title: "Sort Alphabetically",
          description: "Sort species in ascending or descending order.",
          options: [
            { label: "A → Z", action: () => sortSpecies("az") },
            { label: "Z → A", action: () => sortSpecies("za") },
          ],
        },
        "leaf-type": {
          title: "Leaf Type",
          description: "",
          options: leafTypeOptions.map((option) => ({
            label: option,
            value: option,
            type: "leaf-type",
          })),
        },
        "fruit-type": {
          title: "Fruit Type",
          description: "",
          options: fruitTypeOptions.map((option) => ({
            label: option,
            value: option,
            type: "fruit-type",
          })),
        },
      };

      // Function to apply all active filters and search
      function applyFilters() {
        if (
          !window.loadedSpeciesData ||
          window.loadedSpeciesData.length === 0
        ) {
          console.warn("No species data loaded yet");
          return;
        }

        let filtered = [...window.loadedSpeciesData];

        // Apply leaf type filter
        if (activeFilters.leafType) {
          filtered = filtered.filter(
            (species) =>
              species.leaf_type && species.leaf_type === activeFilters.leafType,
          );
        }

        // Apply fruit type filter
        if (activeFilters.fruitType) {
          filtered = filtered.filter(
            (species) =>
              species.fruit_type &&
              species.fruit_type === activeFilters.fruitType,
          );
        }

        // Apply search filter
        const searchInput = document.getElementById("searchInput");
        if (searchInput && searchInput.value.trim() !== "") {
          const query = searchInput.value.toLowerCase().trim();
          filtered = filtered.filter(
            (species) =>
              species.scientific_name &&
              species.scientific_name.toLowerCase().includes(query),
          );
        }

        // Render results or show no results message
        if (filtered.length === 0 && typeof renderNoResults === "function") {
          renderNoResults();
        } else {
          renderSpecies(filtered);
        }
      }

      // Make applyFilters available globally
      window.applyFilters = applyFilters;

      // Function to update filter button active states
      function updateFilterButtonStates() {
        const leafTypeBtn = document.querySelector('[data-filter="leaf-type"]');
        const fruitTypeBtn = document.querySelector(
          '[data-filter="fruit-type"]',
        );

        if (leafTypeBtn) {
          if (activeFilters.leafType) {
            leafTypeBtn.classList.add("active");
          } else {
            leafTypeBtn.classList.remove("active");
          }
        }

        if (fruitTypeBtn) {
          if (activeFilters.fruitType) {
            fruitTypeBtn.classList.add("active");
          } else {
            fruitTypeBtn.classList.remove("active");
          }
        }
      }

      // Function to create option buttons with active state
      function createOptionButton(option, filterType) {
        const optionBtn = document.createElement("button");
        optionBtn.className = "placeholder-option";
        const optionValue = option.value || option;
        optionBtn.textContent = option.label || option;

        // Check if this option is currently active
        const isActive =
          (filterType === "leaf-type" &&
            activeFilters.leafType === optionValue) ||
          (filterType === "fruit-type" &&
            activeFilters.fruitType === optionValue);

        if (isActive) {
          optionBtn.style.background = "#0f172a";
          optionBtn.style.color = "#ffffff";
        }

        optionBtn.onclick = () => {
          if (filterType === "leaf-type") {
            // Toggle leaf type filter
            if (activeFilters.leafType === optionValue) {
              activeFilters.leafType = null; // Deselect if already selected
            } else {
              activeFilters.leafType = optionValue; // Select new option
            }
          } else if (filterType === "fruit-type") {
            // Toggle fruit type filter
            if (activeFilters.fruitType === optionValue) {
              activeFilters.fruitType = null; // Deselect if already selected
            } else {
              activeFilters.fruitType = optionValue; // Select new option
            }
          }

          // Update filter button states
          updateFilterButtonStates();

          // Apply filters
          applyFilters();

          // Close overlay
          filterOverlay.style.display = "none";
        };

        return optionBtn;
      }

      document.querySelectorAll(".filter-button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.filter;

          if (key === "all") {
            // Clear all filters
            activeFilters.leafType = null;
            activeFilters.fruitType = null;

            // Remove active state from all filter buttons except "all"
            document.querySelectorAll(".filter-button").forEach((b) => {
              if (b.dataset.filter !== "all") {
                b.classList.remove("active");
              }
            });
            btn.classList.add("active");

            // Reset search input
            const searchInput = document.getElementById("searchInput");
            if (searchInput) {
              searchInput.value = "";
            }

            // Render all species - check if data is loaded
            if (
              window.loadedSpeciesData &&
              window.loadedSpeciesData.length > 0
            ) {
              renderSpecies(window.loadedSpeciesData);
            } else {
              console.warn("Species data not loaded yet");
            }

            // Don't show overlay for "All" button
            return;
          }

          // Don't remove active state for leaf-type and fruit-type buttons
          // They can be active simultaneously
          // A-Z is a sort, not a filter, so it can work alongside filters
          if (key === "a-z") {
            // A-Z can be active alongside leaf-type and fruit-type
            btn.classList.add("active");
          } else if (key !== "leaf-type" && key !== "fruit-type") {
            document.querySelectorAll(".filter-button").forEach((b) => {
              if (
                b.dataset.filter !== "leaf-type" &&
                b.dataset.filter !== "fruit-type" &&
                b.dataset.filter !== "a-z"
              ) {
                b.classList.remove("active");
              }
            });
            btn.classList.add("active");
          }

          const config = filterConfigs[key];
          if (!config) return;

          filterTitle.textContent = config.title;
          filterDescription.textContent = config.description;
          filterOptions.innerHTML = "";

          config.options.forEach((option) => {
            let optionBtn;

            if (option.action) {
              // For A-Z filter with actions
              optionBtn = document.createElement("button");
              optionBtn.className = "placeholder-option";
              optionBtn.textContent = option.label;
              optionBtn.onclick = () => {
                if (option.action) {
                  option.action();
                }
                filterOverlay.style.display = "none";
              };
            } else {
              // For leaf-type and fruit-type filters
              optionBtn = createOptionButton(option, key);
            }

            filterOptions.appendChild(optionBtn);
          });

          filterOverlay.style.display = "flex";
        });
      });

      closeFilterOverlay.addEventListener("click", () => {
        filterOverlay.style.display = "none";
      });

      const speciesListContainer = document.getElementById("species-list");
      const listViewBtn = document.getElementById("listViewBtn");
      const gridViewBtn = document.getElementById("gridViewBtn");

      function setSpeciesView(view) {
        if (!speciesListContainer) return;

        const isGrid = view === "grid";
        speciesListContainer.classList.toggle("grid-view", isGrid);
        speciesListContainer.classList.toggle("list-view", !isGrid);
        localStorage.setItem("species_view", view);

        if (listViewBtn && gridViewBtn) {
          listViewBtn.classList.toggle("active", !isGrid);
          gridViewBtn.classList.toggle("active", isGrid);
        }
      }

      window.setSpeciesView = setSpeciesView;

      listViewBtn?.addEventListener("click", () => setSpeciesView("list"));
      gridViewBtn?.addEventListener("click", () => setSpeciesView("grid"));

      // Initialize: Set "All" button as active by default when page loads
      document.addEventListener("DOMContentLoaded", () => {
        const allButton = document.querySelector('[data-filter="all"]');
        if (allButton) {
          allButton.classList.add("active");
        }

        const savedView =
          localStorage.getItem("species_view") === "grid" ? "grid" : "list";
        setSpeciesView(savedView);
      });

      let originalOrder = null;

      document.addEventListener("DOMContentLoaded", () => {
        originalOrder = Array.from(document.querySelectorAll(".species-item"));
      });

      function resetSpeciesList() {
        const list = document.getElementById("species-list");
        if (!originalOrder) return;
        originalOrder.forEach((item) => list.appendChild(item));
      }

      function sortSpecies(direction) {
        if (
          !window.loadedSpeciesData ||
          window.loadedSpeciesData.length === 0
        ) {
          console.warn("No species data to sort.");
          return;
        }

        const sorted = [...window.loadedSpeciesData].sort((a, b) => {
          const nameA = a.scientific_name.toLowerCase();
          const nameB = b.scientific_name.toLowerCase();

          return direction === "az"
            ? nameA.localeCompare(nameB)
            : nameB.localeCompare(nameA);
        });

        renderSpecies(sorted);
      }
    </script>
  </body>
</html>
